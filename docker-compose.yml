version: '3.8'

services:
  db:
    image: postgres:17
    container_name: lovamap_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - lovamap_gw_postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  fuseki:
    image: stain/jena-fuseki
    container_name: lovamap_fuseki
    restart: always
    ports:
      - "3032:3030"
    environment:
      - ADMIN_PASSWORD=${FUSEKI_ADMIN_PASSWORD}
    volumes:
      - lovamap_gw_fuseki_data:/fuseki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3030/$$/ping > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
    labels:
      - env=production

  backend:
    build: 
      context: ./GatewayBackend
      args:
        ENVIRONMENT: production
    ports:
      - "5001:8080"
    volumes:
      - /srv/lovamap-shared-data/lovamap-gw/production/Domains:/app/Data/Domains
      - /srv/lovamap-shared-data/lovamap-gw/production/JobResults:/app/Data/JobResults

    depends_on:
      db:
        condition: service_healthy
    env_file:
        - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: ./GatewayUI/react-ui
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.production.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
    environment:
      - CERTBOT_INIT=false # Will be set to true once certificates exist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  certbot:
    image: certbot/certbot
    container_name: certbot
    profiles: ["production"]
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  certbot-renewer:
    image: certbot/certbot
    container_name: certbot_renewer
    restart: always
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot && touch /var/www/certbot/reload.flag || true; sleep 12h & wait $${!}; done'
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  umami-db-init:
    image: postgres:17
    container_name: umami_db_init
    profiles: ["production"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: ["sh", "-c", "psql -h db -U ${POSTGRES_USER} -c 'CREATE DATABASE umami' || true"]
    restart: "no"

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: lovamap_umami
    profiles: ["production"]
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      db:
        condition: service_healthy
      umami-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  lovamap_gw_postgres_data:
    external: true
  lovamap_gw_fuseki_data:
    external: true