version: '3.8'

services:
  test_db:
    image: postgres:17
    container_name: lovamap_test_db
    restart: always
    env_file:
      - .env.test
    ports:
      - "5433:5432"  # PORT 5433 - Avoid conflict with prod
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    labels:
      - env=test

  test_fuseki:
    image: stain/jena-fuseki
    container_name: lovamap_test_fuseki
    restart: always
    ports:
      - "127.0.0.1:3031:3030"
    environment:
      - ADMIN_PASSWORD=${FUSEKI_ADMIN_PASSWORD}
    volumes:
      - fuseki_data_test:/fuseki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3030/$$/ping > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
    labels:
      - env=test

volumes:
  postgres_data_test:
  fuseki_data_test: